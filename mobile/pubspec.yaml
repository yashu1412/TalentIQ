name: talentiq_mobile
description: TalentIQ Flutter mobile client
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  file_picker: ^8.1.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  shared_preferences: ^2.3.2
  webview_flutter: ^4.13.1
  webview_flutter_web: ^0.2.3+4
  url_launcher: ^6.3.2

  webview_flutter_android: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.dev
    - .env.staging
    - .env.prod
